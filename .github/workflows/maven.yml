name: API Regression Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull code down into the cloud virtual machine
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # 2. Set up the Java execution runtime environment
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    # 3. Download dependencies and run the TestNG automation suite
    - name: Execute API Tests via Maven
      run: mvn clean test