name: API Regression Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull code down into the cloud virtual machine
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # 2. Set up the Java execution runtime environment
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    # 3. Securely pass credentials and run the TestNG automation suite
    - name: Execute API Tests via Maven
      env:
        # This maps precisely to your ConfigReader's cascading lookup (TEST_PASSWORD)
        # Store your actual password in your GitHub Repository settings under Secrets -> Actions
        TEST_PASSWORD: ${{ secrets.API_TEST_PASSWORD || 'NoLombok123' }}
        BASE_URL: https://api.realworld.show
      run: mvn clean test

    # 4. Save and export the HTML reports before the container is wiped out
    - name: Upload TestNG Execution HTML Reports
      if: always() # Ensures reports upload even if a test case fails
      uses: actions/upload-artifact@v4
      with:
        name: testng-execution-reports
        path: |
          target/surefire-reports/
          test-output/
        retention-days: 5